name: Update Citation Counts

on:
  schedule:
    - cron: '0 3 * * *'  # 매일 UTC 03:00 (한국시간 12:00)
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch citation counts
        run: python3 scripts/fetch_citations.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/citations.yml
          git diff --staged --quiet || git commit -m "Update citation counts [skip ci]"
          git push
